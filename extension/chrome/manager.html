<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>SyncMark Manager</title>
  <link rel="stylesheet" href="manager.css">
</head>
<body>
  <header>
    <div class="container header-content">
      <div class="logo-section">
        <div class="logo-icon">
          <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <path d="M19 21l-7-5-7 5V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2z"/>
            <path d="M12 7v6"/>
            <path d="M9 10h6"/>
          </svg>
        </div>
        <div class="logo-text">
          <h1>SyncMark</h1>
          <p>Internal Local Manager</p>
        </div>
      </div>
      <div id="fileStatus" class="status-badge">
        No file connected
      </div>
      <div id="syncStatus" class="status-badge hidden" style="background: #10b981; margin-left: 10px; cursor: pointer;">
        Sync Pending
      </div>
    </div>
  </header>

  <main class="container">
    <!-- Connection State -->
    <div id="setupView" class="setup-view">
      <div class="setup-icon">
        <svg xmlns="http://www.w3.org/2000/svg" width="40" height="40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="animate-spin-slow"><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>
      </div>
      <h2>Connect your Bookmarks File</h2>
      <p>
        SyncMark is fully local. Pick a JSON file from your iCloud, Dropbox, or Google Drive folder to start syncing.
      </p>
      <div class="btn-group">
        <button id="openFileBtn" class="btn btn-primary">
          Open Existing File
        </button>
        <button id="createFileBtn" class="btn btn-secondary">
          Create New File
        </button>
      </div>
    </div>

    <!-- Bookmarks View -->
    <div id="bookmarksView" class="bookmarks-view hidden">
      <div class="toolbar">
        <div class="search-container">
          <input type="text" id="searchInput" placeholder="Search bookmarks...">
          <svg class="search-icon" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.3-4.3"/></svg>
        </div>
        <div class="btn-group">
          <button id="importBtn" class="btn btn-secondary" style="padding: 0.5rem 1rem; font-size: 0.875rem; display: flex; align-items: center; gap: 0.5rem;">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" y1="3" x2="12" y2="15"/></svg>
            Import Instapaper
          </button>
          <input type="file" id="importInput" accept=".csv" class="hidden">
          <button id="addBtn" class="btn btn-add">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M5 12h14"/><path d="M12 5v14"/></svg>
            Add New
          </button>
        </div>
      </div>

      <div id="bookmarksGrid" class="grid">
        <!-- Cards injected here -->
      </div>
    </div>
  </main>

  <!-- Add Modal -->
  <div id="addModal" class="modal hidden">
    <div class="modal-overlay" id="modalOverlay"></div>
    <div class="modal-content">
      <div class="modal-header">Add Bookmark</div>
      <form id="addForm" class="modal-body">
        <div class="form-group">
          <input type="url" id="bmUrl" placeholder="URL (https://...)" required>
        </div>
        <div class="form-group">
          <input type="text" id="bmTitle" placeholder="Title (Optional)">
        </div>
        <div class="form-group">
          <input type="text" id="bmTags" placeholder="Tags (comma separated)..." list="tagSuggestions">
          <datalist id="tagSuggestions"></datalist>
        </div>
        <div class="modal-footer">
          <button type="button" id="cancelBtn" class="btn btn-secondary" style="flex: 1;">Cancel</button>
          <button type="submit" class="btn btn-primary" style="flex: 1;">Save</button>
        </div>
      </form>
    </div>
  </div>

  <script src="manager.js"></script>
</body>
</html>
